<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ノリノリ万利休</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="paper"></div>

<div id="menu" class="menu">
  <div class="title">ノリノリ万利休</div>
  <button onclick="startGame('senkou')">せんこう</button>
  <button onclick="startGame('koukou')">こうこう</button>
</div>

<div id="game" class="hidden stage">

  <div class="title">ノリノリ万利休</div>

  <!-- ★ここがCanvas化 -->
  <canvas id="canvas"></canvas>

  <div id="turn" class="turn"></div>

  <div class="input-wrap">
    <input id="input" type="text" maxlength="1" />
  </div>

</div>

<div id="overlay" class="overlay">
  <div class="kakejiku">
    <div id="result" class="result"></div>
    <button onclick="copyX()">Xに投句</button>
    <button onclick="resetGame()">もう一度</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
