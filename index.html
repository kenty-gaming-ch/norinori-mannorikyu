<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ノリノリ万利休</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="menu" class="screen">
  <h1>ノリノリ万利休</h1>

  <button onclick="startGame('senkou')">
    せんこう
  </button>

  <button onclick="startGame('koukou')">
    こうこう
  </button>
</div>

<div id="game" class="screen hidden">

  <h1>ノリノリ万利休</h1>

  <div id="haiku" class="haiku">

    <div id="kami" class="ku"></div>

    <div id="naka" class="ku"></div>

    <div id="shimo" class="ku"></div>

  </div>

  <div id="turn"></div>

  <input
    id="input"
    maxlength="1"
    autocomplete="off"
  >

</div>

<div id="overlay" class="overlay">

  <div class="result-box">

    <div class="title">完成</div>

    <pre id="result"></pre>

    <button onclick="copyX()">
      Xに投稿
    </button>

    <button onclick="resetGame()">
      もう一度
    </button>

  </div>

</div>

<script src="js/ai.js"></script>
<script src="js/render.js"></script>
<script src="js/game.js"></script>
<script src="js/ui.js"></script>

</body>
</html>
