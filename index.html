<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ノリノリ万利休</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- メニュー -->
<div id="menu" class="menu">
  <button onclick="startGame('senkou')">せんこう（あなた）</button>
  <button onclick="startGame('koukou')">こうこう（AI）</button>
</div>

<!-- ゲーム本体 -->
<div id="game" class="hidden">

  <div class="title">ノリノリ万利休</div>

  <!-- 575 縦書き -->
  <div class="haiku-vertical">
    <div id="line1" class="vline"></div>
    <div id="line2" class="vline"></div>
    <div id="line3" class="vline"></div>
  </div>

  <div id="turn" class="turn"></div>

  <div class="input-area">
    <input id="input" type="text" maxlength="1" placeholder="ひらがな1文字" />
  </div>

</div>

<!-- 完成画面 -->
<div id="overlay" class="overlay">
  <div class="complete">しゅうりょう</div>
  <div id="result" class="result"></div>

  <button onclick="copyX()">Xにポスト</button>
  <button onclick="resetGame()">もういちど</button>
</div>

<script src="app.js"></script>
</body>
</html>
