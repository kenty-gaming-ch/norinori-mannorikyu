<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ひらがなはいく</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- モード選択（最初だけ表示） -->
<div id="menu" class="menu">
  <button onclick="startGame('senkou')">せんこう</button>
  <button onclick="startGame('koukou')">こうこう</button>
  <button onclick="startGame('random')">らんだむ</button>
</div>

<!-- ゲーム本体 -->
<div id="game" class="hidden">

  <div class="title">ひらがなはいく</div>

  <!-- 575枠 -->
  <div class="haiku">
    <div class="line" id="line1"></div>
    <div class="line" id="line2"></div>
    <div class="line" id="line3"></div>
  </div>

  <div id="turn" class="turn"></div>

  <!-- 入力 -->
  <div class="input-area">
    <input id="input" type="text" maxlength="1" placeholder="ひらがな1文字" />
    <button onclick="submitChar()">うたう</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
