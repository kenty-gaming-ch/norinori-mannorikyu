<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ノリノリ万利休</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="paper"></div>

<!-- メニュー -->
<div id="menu" class="menu">
  <div class="title">ノリノリ万利休</div>
  <button onclick="startGame('senkou')">せんこう</button>
  <button onclick="startGame('koukou')">こうこう</button>
</div>

<!-- ゲーム -->
<div id="game" class="stage hidden">

  <canvas id="canvas"></canvas>

  <div id="turn" class="turn"></div>

  <input id="input" maxlength="1" />

</div>

<!-- 完成 -->
<div id="overlay" class="overlay">
  <div class="kakejiku">
    <div id="result" class="result"></div>
    <button onclick="copyX()">Xに投稿</button>
    <button onclick="resetGame()">もう一度</button>
  </div>
</div>

<script src="js/render.js"></script>
<script src="js/ai.js"></script>
<script src="js/game.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
